<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桶管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 桶管理系统</h1>
            <p>现代化桶生命周期管理平台</p>
        </header>
        
        <main>
            <div class="dashboard">
                <div class="card">
                    <h2>欢迎使用桶管理系统</h2>
                    <p>这是一个基于二维码技术的现代化桶管理解决方案</p>
                    <div class="features">
                        <div class="feature">✅ 二维码生成与下载</div>
                        <div class="feature">✅ 二维码扫描识别</div>
                        <div class="feature">✅ 实时状态更新</div>
                        <div class="feature">✅ 数据持久化存储</div>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-number">0</span>
                        <span class="stat-label">总桶数</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">0</span>
                        <span class="stat-label">使用中</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">0</span>
                        <span class="stat-label">空闲</span>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>© 2024 桶管理系统 | 基于Node.js + Express + MongoDB</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
